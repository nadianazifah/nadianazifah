<!DOCTYPE html>
<html>
<head>
<title>CakeLib - Digital Cake Library</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
margin:0;
font-family:'Poppins',sans-serif;
background:#fffaf4;
color:#4b3b1f;
}

/* NAVBAR */
.navbar{
background:rgba(255,255,255,0.9);
padding:15px 40px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
position:sticky;
top:0;
}

.navbar a{
margin-left:20px;
cursor:pointer;
text-decoration:none;
color:#6b5b2a;
}

.nav-btn{
background:#f4c542;
padding:6px 12px;
border-radius:20px;
color:white;
}

/* HERO */
.hero{
text-align:center;
padding:120px 20px;
background:linear-gradient(rgba(255,240,200,0.8),rgba(255,240,200,0.8)),
url('https://images.unsplash.com/photo-1603532648955-039310d9ed75');
background-size:cover;
}

.search-box input{
padding:10px;
border-radius:20px;
border:none;
}

/* CARD */
.collection{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
padding:40px;
}

.card{
width:230px;
background:white;
border-radius:20px;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
text-align:center;
cursor:pointer;
}

.card img{
width:100%;
height:150px;
border-radius:20px 20px 0 0;
}

.btn-card{
margin:10px;
padding:8px;
background:#f4c542;
border:none;
color:white;
border-radius:20px;
}

/* PAGE */
.tentang,.login-section,.eventPage,.forumPage,.detailPage{
display:none;
padding:60px;
text-align:center;
}

/* FOOTER */
.footer{
background:#f4c542;
color:white;
padding:40px;
}

/* RATING */
.rating span{
cursor:pointer;
color:#ccc;
font-size:20px;
}
.rating .active{color:gold;}

.favorite{cursor:pointer;color:#ccc;}
.favorite.active{color:red;}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
<b>🎂 CakeLib</b>
<div>
<a onclick="showHome()">Beranda</a>
<a onclick="showTentang()">Informasi</a>
<a onclick="showEvent()">Event</a>
<a onclick="showForum()">Forum</a>
<a onclick="showAuth()" class="nav-btn">Login</a>
</div>
</div>

<!-- HOME -->
<div id="homePage">
<div class="hero">
<h1>Selamat Datang di CakeLib 🎂</h1>
<input id="searchInput" placeholder="Cari..." onkeyup="searchResep()">
</div>

<div class="collection" id="resepList">

<div class="card" onclick="openDetail('Birthday Cake','Kue ulang tahun','birthdaycake.jpg',['Tepung','Telur'],['Aduk','Panggang'])">
<img src="birthdaycake.jpg">
<h3>Birthday Cake</h3>
</div>

<div class="card" onclick="openDetail('Cookies','Cookies lezat','cookiess.jpg',['Butter','Gula'],['Aduk','Oven'])">
<img src="cookiess.jpg">
<h3>Cookies</h3>
</div>

</div>
</div>

<!-- EVENT -->
<div id="eventPage" class="eventPage">
<h2>Event CakeLib 🎉</h2>

<div class="collection">
<div class="card">
<img src="workshop.jpg">
<h3>Workshop Baking</h3>
<button class="btn-card">Daftar</button>
</div>

<div class="card">
<img src="Decorating cake.jpg">
<h3>Lomba Hias Cake</h3>
<button class="btn-card">Ikuti</button>
</div>
</div>
</div>

<!-- FORUM -->
<div id="forumPage" class="forumPage">
<h2>Forum Baking</h2>
<input id="namaUser" placeholder="Nama"><br>
<textarea id="isiPesan"></textarea><br>
<button onclick="kirimForum()">Kirim</button>
<div id="listForum"></div>
</div>

<!-- DETAIL -->
<div id="detailPage" class="detailPage">
<h2 id="judulResep"></h2>
<img id="gambarResep" style="width:300px">
<p id="deskripsiResep"></p>

<ul id="bahanResep"></ul>
<ol id="caraResep"></ol>

<div class="rating">
<span onclick="rate(1)">★</span>
<span onclick="rate(2)">★</span>
<span onclick="rate(3)">★</span>
<span onclick="rate(4)">★</span>
<span onclick="rate(5)">★</span>
</div>

<p class="favorite" onclick="toggleFavorite()">❤️ Favorit</p>

<button onclick="showHome()">Kembali</button>
</div>

<!-- LOGIN -->
<div id="authPage" class="login-section">

<h2 id="formTitle">Login</h2>

<div id="loginForm">
<input id="loginEmail" placeholder="Email"><br>
<input id="loginPass" placeholder="Password"><br>
<button onclick="loginUser()">Login</button>
<p onclick="showRegister()">Daftar</p>
</div>

<div id="registerForm" style="display:none;">
<input id="regNama" placeholder="Nama"><br>
<input id="regEmail"><br>
<input id="regPass"><br>
<button onclick="registerUser()">Daftar</button>
</div>

</div>

<!-- FOOTER -->
<div class="footer">
<p>📍 Medan | 📧 cakelib@gmail.com | 📞 0812-3456</p>
</div>

<script>

/* NAV */
function showHome(){
homePage.style.display="block";
eventPage.style.display="none";
forumPage.style.display="none";
authPage.style.display="none";
detailPage.style.display="none";
}

function showEvent(){hideAll();eventPage.style.display="block";}
function showForum(){hideAll();forumPage.style.display="block";}
function showAuth(){hideAll();authPage.style.display="block";}
function showTentang(){alert("Tentang CakeLib");}

function hideAll(){
homePage.style.display="none";
eventPage.style.display="none";
forumPage.style.display="none";
authPage.style.display="none";
detailPage.style.display="none";
}

/* SEARCH */
function searchResep(){
let input=searchInput.value.toLowerCase();
document.querySelectorAll(".card").forEach(c=>{
c.style.display=c.innerText.toLowerCase().includes(input)?"block":"none";
});
}

/* DETAIL */
function openDetail(j,d,g,b,c){
hideAll();
detailPage.style.display="block";
judulResep.innerText=j;
gambarResep.src=g;
deskripsiResep.innerText=d;

bahanResep.innerHTML=b.map(x=>"<li>"+x+"</li>").join("");
caraResep.innerHTML=c.map(x=>"<li>"+x+"</li>").join("");
}

/* RATING */
function rate(n){
document.querySelectorAll(".rating span").forEach((s,i)=>{
s.classList.toggle("active",i<n);
});
}

/* FAVORITE */
function toggleFavorite(){
document.querySelector(".favorite").classList.toggle("active");
}

/* FORUM */
function kirimForum(){
let box=document.createElement("div");
box.innerHTML="<b>"+namaUser.value+"</b><p>"+isiPesan.value+"</p>";
listForum.prepend(box);
}

/* LOGIN */
function showRegister(){
loginForm.style.display="none";
registerForm.style.display="block";
}

function registerUser(){
localStorage.setItem("user",JSON.stringify({
email:regEmail.value,
pass:regPass.value
}));
alert("Berhasil daftar");
}

function loginUser(){
let u=JSON.parse(localStorage.getItem("user"));
if(u && u.email==loginEmail.value && u.pass==loginPass.value){
alert("Login berhasil");
showHome();
}else{
alert("Salah");
}
}

</script>

</body>
</html>
